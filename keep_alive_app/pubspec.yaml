name: keep_alive_app
description: "Cross-platform menu bar / system tray app wrapping the KeepAlive Go CLI."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  window_manager: ^0.5.1
  shared_preferences: ^2.3.5
  path_provider: ^2.1.5
  dio: ^5.8.0
  archive: ^4.0.3
  logging: ^1.3.0
  url_launcher: ^6.3.1
  flutter_launcher_icons: ^0.14.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.6.1
  build_runner: ^2.4.15
  mockito: ^5.4.5
  flutter_lints: ^5.0.0

flutter_launcher_icons:
  image_path: "assets/icons/app_icon.png"
  macos:
    generate: true
    image_path: "assets/icons/app_icon.png"
  windows:
    generate: true
    image_path: "assets/icons/app_icon.png"
    icon_size: 48
  linux:
    generate: true
    image_path: "assets/icons/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
